<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurement - Aurelius POS</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebarTarget"></div>

        <main class="main-content">
            <header class="navbar">
                <div class="page-title">Procurement (Stock Purchase)</div>
                <div class="user-profile">
                    <button id="newPurchaseBtn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> New Stock Inward
                    </button>
                </div>
            </header>

            <div class="content-body">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Stock Value (Current)</div>
                        <div class="stat-value">₹<span id="stockValue">0.00</span></div>
                    </div>
                </div>

                <h3 class="mb-4">Purchase History</h3>
                <div class="stat-card">
                    <div class="table-container" style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 1px solid var(--border-color); text-align: left;">
                                    <th style="padding: 1rem; color: var(--text-muted);">Date</th>
                                    <th style="padding: 1rem; color: var(--text-muted);">Supplier</th>
                                    <th style="padding: 1rem; color: var(--text-muted);">Total Cost</th>
                                    <th style="padding: 1rem; color: var(--text-muted);">Items Received</th>
                                    <th style="padding: 1rem; color: var(--text-muted); text-align: right;">Action</th>
                                </tr>
                            </thead>
                            <tbody id="purchaseHistoryTable">
                                <!-- History will be populated here -->
                                <tr><td colspan="5" style="padding: 2rem; text-align: center; color: var(--text-muted);">Loading purchases...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Purchase Modal -->
    <div id="purchaseModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 600px;">
            <h2 class="mb-4">New Stock Entry</h2>
            <form id="purchaseForm">
                <div class="form-group mb-4">
                    <label class="form-label">Supplier Name</label>
                    <input type="text" id="supplierName" class="input-control" placeholder="E.g. Global Supplies Ltd" required>
                </div>
                
                <div style="padding: 1rem; border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 2rem;">
                    <label class="form-label">Product to Add</label>
                    <div class="flex mb-4" style="display: flex; gap: 1rem;">
                        <select id="procureProduct" class="input-control" style="flex: 2;">
                            <!-- Products populated -->
                        </select>
                        <input type="number" id="procureQty" class="input-control" placeholder="Qty" style="flex: 1;">
                        <input type="number" id="procureCost" class="input-control" placeholder="Cost/Unit" step="0.01" style="flex: 1;">
                        <button type="button" id="addItemBtn" class="btn btn-outline" style="padding: 0.5rem 1rem;">ADD</button>
                    </div>

                    <div id="addedItemsList" style="margin-top: 1rem;">
                        <!-- List of items to purchase -->
                    </div>
                </div>

                <div class="flex justify-between items-center mb-4" style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.25rem;">
                    <span>TOTAL COST:</span>
                    <span class="text-accent">₹<span id="purchaseTotal">0.00</span></span>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center;">Confirm Purchase</button>
                    <button type="button" class="btn btn-outline" style="flex: 1; justify-content: center;" onclick="closePurchaseModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/procurement.js"></script>
</body>
</html>
