<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Aurelius POS</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebarTarget"></div>

        <main class="main-content">
            <header class="navbar">
                <div class="page-title">General Settings</div>
            </header>

            <div class="content-body">
                <div class="stat-card" style="max-width: 600px;">
                    <form id="settingsForm">
                        <div class="form-group mb-4">
                            <label class="form-label">Business Name</label>
                            <input type="text" id="businessName" class="input-control" value="Aurelius POS">
                        </div>
                        <div class="form-group mb-4">
                            <label class="form-label">GST Number</label>
                            <input type="text" id="gstNumber" class="input-control" value="29AAAAA0000A1Z5">
                        </div>
                        <div class="form-group mb-4">
                            <label class="form-label">GST Percentage (%)</label>
                            <input type="number" id="gstPercent" class="input-control" value="18">
                        </div>
                        <div class="form-group mb-4">
                            <label class="form-label">Store Address</label>
                            <textarea id="storeAddress" class="input-control" rows="3">MG Road, Bangalore, KA, India</textarea>
                        </div>
                        <div class="form-group mb-4">
                            <label class="form-label">Invoice Footer Message</label>
                            <input type="text" id="invoiceFooter" class="input-control" value="Thank you for shopping with us!">
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100" style="width: 100%; justify-content: center;">
                            Save Settings
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        document.getElementById('settingsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Settings saved locally (API integration pending)');
        });
    </script>
</body>
</html>
