<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Aurelius POS</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .register-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
        }
        .register-card {
            width: 100%;
            max-width: 450px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="register-page">
    <div class="register-card">
        <div class="text-center mb-4" style="text-align: center;">
            <div class="logo-icon mb-2" style="margin: 0 auto;">📝</div>
            <h1 class="logo-text">Create Account</h1>
            <p class="text-muted">Register new staff/admin</p>
        </div>
        <form id="registerForm">
            <div class="form-group mb-4">
                <label class="form-label">Full Name</label>
                <input type="text" id="fullName" class="input-control" placeholder="John Doe" required>
            </div>
            <div class="form-group mb-4">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="input-control" placeholder="staff@example.com" required>
            </div>
            <div class="form-group mb-4">
                <label class="form-label">Role</label>
                <select id="role" class="input-control" required disabled>
                    <option value="staff" selected>Staff (Cashier)</option>
                </select>
            </div>
            <div class="form-group mb-4">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="input-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" style="width: 100%; justify-content: center; height: 50px;">
                Create Account
            </button>
        </form>
        <div class="mt-4 text-center" style="text-align: center; margin-top: 1.5rem;">
            <p class="text-muted">Already have an account? <a href="index.html" class="text-accent">Login here</a></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
