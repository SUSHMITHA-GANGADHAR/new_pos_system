<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - Aurelius POS</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebarTarget"></div>

        <main class="main-content">
            <header class="navbar">
                <div class="page-title">Inventory Management</div>
            </header>

            <div class="content-body">
                <!-- Filters Section -->
                <div class="stat-card mb-4" style="padding: 1.25rem 1.75rem; display: flex; flex-direction: row; gap: 2rem; align-items: center; background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border-color);">
                    <div style="flex: 2; display: flex; gap: 1rem; align-items: center;">
                        <i class="fas fa-search text-muted"></i>
                        <input type="text" id="inventorySearch" class="input-control" placeholder="Search by name, SKU..." style="border: none; background: transparent;">
                    </div>
                    <div style="flex: 3; display: flex; gap: 1.5rem;">
                        <div class="form-group mb-0" style="flex: 1;">
                            <select id="categoryFilter" class="input-control">
                                <option value="all">All Categories</option>
                            </select>
                        </div>
                        <div class="form-group mb-0" style="flex: 1;">
                            <select id="stockFilter" class="input-control">
                                <option value="all">All Stock Status</option>
                                <option value="low">Low Stock</option>
                                <option value="out">Out of Stock</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <button id="addProductBtn" class="btn btn-primary btn-sm" onclick="showProductModal()">
                            <i class="fas fa-plus"></i> New Product
                        </button>
                    </div>
                </div>

                <!-- Inventory Table -->
                <div class="stat-card">
                    <div class="table-container" style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 1px solid var(--border-color); text-align: left;">
                                    <th style="padding: 1rem; color: var(--text-muted);">Product</th>
                                    <th style="padding: 1rem; color: var(--text-muted);">SKU</th>
                                    <th style="padding: 1rem; color: var(--text-muted);">Category</th>
                                    <th style="padding: 1rem; color: var(--text-muted);">Price</th>
                                    <th style="padding: 1rem; color: var(--text-muted);">Stock</th>
                                    <th style="padding: 1rem; color: var(--text-muted); text-align: right;">Action</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryTable">
                                <!-- Products will be populated here -->
                                <tr><td colspan="6" style="padding: 2rem; text-align: center; color: var(--text-muted);">Loading inventory...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 600px;">
            <h2 id="modalTitle" class="mb-4">Add Product</h2>
            <form id="productForm">
                <input type="hidden" id="editProductId">
                <div class="mb-4" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label">Product Name</label>
                        <input type="text" id="pName" class="input-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">SKU</label>
                        <input type="text" id="pSku" class="input-control" required>
                    </div>
                </div>
                
                <div class="mb-4" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select id="pCategory" class="input-control" required>
                            <!-- categories populated from DB -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Price (₹)</label>
                        <input type="number" id="pPrice" class="input-control" step="0.01" required>
                    </div>
                </div>

                <div class="mb-4" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label">Stock Quantity</label>
                        <input type="number" id="pStock" class="input-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Low Stock Alert Threshold</label>
                        <input type="number" id="pThreshold" class="input-control" value="10">
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center;">Save Product</button>
                    <button type="button" class="btn btn-outline" style="flex: 1; justify-content: center;" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/inventory.js"></script>
</body>
</html>
