<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Modern Retail POS</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body class="login-page">
    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon mb-2" style="margin: 0 auto;">🛒</div>
            <h1 class="logo-text mb-1">POS System</h1>
            <p class="text-muted">Sign in to your account</p>
        </div>
        <form id="loginForm">
            <div class="form-group mb-4">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="input-control" placeholder="admin@example.com" required>
            </div>
            <div class="form-group mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="input-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100"
                style="width: 100%; justify-content: center; height: 50px;">
                Login
            </button>
        </form>
        <div class="mt-4 text-center" style="text-align: center; margin-top: 1.5rem;">
            <p class="text-muted">New staff/admin? <a href="register.html" class="text-accent">Create account</a></p>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>

</html>
