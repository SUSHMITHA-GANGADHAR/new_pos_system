<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Reports - Aurelius POS</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebarTarget"></div>

        <main class="main-content">
            <header class="navbar">
                <div class="page-title">Sales History & Reports</div>
            </header>

            <div class="content-body" style="padding-top: 0.5rem;">
                <div class="stat-card mb-4" style="padding: 1rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; background: rgba(15, 23, 42, 0.4);">
                    <div style="flex: 1; display: flex; gap: 1rem; align-items: center;">
                        <div class="form-group mb-0" style="flex: 2;">
                            <input type="text" id="salesSearch" class="input-control" placeholder="Search Invoice ID or Customer...">
                        </div>
                        <div class="form-group mb-0" style="flex: 1; min-width: 180px;">
                            <input type="date" id="dateFilter" class="input-control">
                        </div>
                    </div>
                    <div class="text-muted small" style="white-space: nowrap;">
                        <i class="fas fa-filter"></i> Filters Active
                    </div>
                </div>

                <div class="stat-card">
                    <div class="table-container" style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 1px solid var(--border-color); text-align: left;">
                                    <th style="padding: 1rem; color: var(--text-muted);">Invoice ID</th>
                                    <th style="padding: 1rem; color: var(--text-muted);">Date</th>
                                    <th style="padding: 1rem; color: var(--text-muted);">Customer</th>
                                    <th style="padding: 1rem; color: var(--text-muted);">Amount</th>
                                    <th style="padding: 1rem; color: var(--text-muted);">GST</th>
                                    <th style="padding: 1rem; color: var(--text-muted);">Grand Total</th>
                                </tr>
                            </thead>
                            <tbody id="salesTable">
                                <!-- Sales history will be populated here -->
                                <tr><td colspan="6" style="padding: 2rem; text-align: center; color: var(--text-muted);">Loading sales history...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sales.js"></script>
    <script>
        async function injectSidebar() {
            const user = JSON.parse(localStorage.getItem('user'));
            const role = user ? user.role : 'staff';
            
            let menuHtml = `
                <div class="menu-item">
                    <a href="dashboard.html" class="menu-link">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </a>
                </div>
                <div class="menu-item">
                    <a href="pos.html" class="menu-link">
                        <i class="fas fa-cash-register"></i>
                        <span>POS Billing</span>
                    </a>
                </div>`;
            
            if (role === 'admin') {
                menuHtml += `
                <div class="menu-item">
                    <a href="inventory.html" class="menu-link">
                        <i class="fas fa-boxes"></i>
                        <span>Inventory</span>
                    </a>
                </div>
                <div class="menu-item">
                    <a href="procurement.html" class="menu-link">
                        <i class="fas fa-truck"></i>
                        <span>Procurement</span>
                    </a>
                </div>
                <div class="menu-item">
                    <a href="sales.html" class="menu-link active">
                        <i class="fas fa-chart-line"></i>
                        <span>Sales Reports</span>
                    </a>
                </div>
                <div class="menu-item">
                    <a href="customers.html" class="menu-link">
                        <i class="fas fa-users"></i>
                        <span>Customers</span>
                    </a>
                </div>
                <div class="menu-item">
                    <a href="settings.html" class="menu-link">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </a>
                </div>`;
            }

            const sidebarHtml = `
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="logo-icon"><i class="fas fa-shopping-cart"></i></div>
                    <div class="logo-text">Aurelius POS</div>
                </div>
                
                <nav class="sidebar-menu">
                    ${menuHtml}
                </nav>

                <div class="sidebar-footer">
                    <a href="#" id="logoutBtn" class="menu-link text-danger">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </aside>`;
            document.getElementById('sidebarTarget').innerHTML = sidebarHtml;
        }
        injectSidebar();
    </script>
</body>
</html>
